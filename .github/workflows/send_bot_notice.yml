name: Send Telegram Bot Notification
permissions:
  contents: read
  actions: read
on:
  workflow_dispatch:
    inputs:
      # ==================== Bot-Push Options ====================
      msg_type:
        description: "Notification Type"
        type: string  # Original boolean is unreasonable, changed to string to support custom types
        default: "notice"
        required: true
      content:
        description: "Notification Content"
        type: string
        default: ""
        required: true
jobs:
  send-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Group Notification (Channel Discussion Group)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID_3 }}
          MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID_3 }}
        run: |
          set -euo pipefail
          # Define input variables
          INPUT_MSG_TYPE="${{ inputs.msg_type }}"
          INPUT_CONTENT="${{ inputs.content }}"
          
          # Validate key environment variables
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "Error: BOT_TOKEN or CHAT_ID not configured"
            exit 1
          fi
          
          # Construct HTML formatted message content, adapting to Telegram escaping
          TEXT="<b>New Notifications: </b>%0A%0A"
          TEXT+="<b>Notification type：</b><code>${INPUT_MSG_TYPE}</code>%0A%0A"
          TEXT+="<b>Notification content：</b>%0A<pre>${INPUT_CONTENT}</pre>"
          
          # Send Telegram request and capture response
          echo "Starting to send Telegram notification..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "message_thread_id=${MESSAGE_THREAD_ID}" \
            -d "parse_mode=HTML" \
            -d "text=${TEXT}")

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=-1003567736013" \
            -d "parse_mode=HTML" \
            -d "text=${TEXT}")
          
          # Parse response status code and content
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
          
          # Result check
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Notification sent successfully! Response: $RESPONSE_BODY"
          else
            echo "❌ Notification send failed! HTTP Code: $HTTP_CODE, Response: $RESPONSE_BODY"
            exit 1
          fi
