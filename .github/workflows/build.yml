      # ==================== Collect Patch Conflict Files ====================
      # Collect all .rej files for debugging patch failure issues
      - name: Collect Patch Conflict Files
        if: always()
        run: |
          REJECTS_DIR="$GITHUB_WORKSPACE/patch-rejects"
          mkdir -p "$REJECTS_DIR"

          mapfile -t REJS < <(find "$KERNEL_ROOT" -type f -name '*.rej')
          REJ_COUNT=${#REJS[@]}
          echo "Found $REJ_COUNT .rej files"
          echo "REJ_COUNT=$REJ_COUNT" >> $GITHUB_ENV

          if [ "$REJ_COUNT" -gt 0 ]; then
            for REJ in "${REJS[@]}"; do
              REL="${REJ#"$KERNEL_ROOT"/}"
              DEST="$REJECTS_DIR/$REL"
              mkdir -p "$(dirname "$DEST")"
              cp "$REJ" "$DEST"

              ORIG="${REJ%.rej}"
              if [ -f "$ORIG" ]; then
                cp "$ORIG" "${DEST%.rej}"
              fi
              echo "$REL" >> "$REJECTS_DIR/index.txt"
            done
          fi

      # ==================== Upload Build Artifacts ====================
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ReSukiSU_kernel-${{ env.CONFIG }}
          path: |
            *AnyKernel3.zip
#            *.img
          compression-level: 9

      # ==================== Upload Patch Conflict Files ====================
      - name: Upload Patch Conflict Files
        if: always() && env.REJ_COUNT > 0
        uses: actions/upload-artifact@v6
        with:
          name: ReSukiSU_kernel-${{ env.CONFIG }}-Rejects
          path: patch-rejects/
          if-no-files-found: ignore
          compression-level: 9
