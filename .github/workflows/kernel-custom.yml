name: Android Kernel Build - Custom

# Adapt to Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      # ==================== Kernel Version Configuration ====================
      android_version:
        description: "Android Version"
        required: true
        type: choice
        options:
          - android12
          - android13
          - android14
          - android15
          - android16
        default: android12
      kernel_version:
        description: "Kernel Version"
        required: true
        type: choice
        options:
          - "5.10"
          - "5.15"
          - "6.1"
          - "6.6"
          - "6.12"
        default: "5.10"
      sub_level:
        description: "Sublevel (e.g. 66, 198, X)"
        required: true
        type: string
        default: "66"
      os_patch_level:
        description: "Security patch level (e.g. 2022-01, lts)"
        required: true
        type: string
        default: "2022-01"
      revision:
        description: "Revision (e.g. r11, only 5.10 requires)"
        required: false
        type: string
        default: "r11"

      # ==================== KernelSU Configuration ====================
      # KernelSU variant is fixed to ReSukiSU
      kernelsu_branch:
        description: "KSU branch (main/builtin/custom commit hash, leave empty for default)"
        required: false
        type: string
        default: ""

      # ==================== Optional Configuration ====================
      version:
        description: "Custom version name (optional)"
        required: false
        type: string
      build_time:
        description: "Custom build time (optional, N or empty = current UTC)"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"

      # ==================== Feature Switches ====================
      use_zram:
        description: "Enable ZRAM enhancement algorithm"
        required: true
        type: boolean
        default: false
      use_bbg:
        description: "Enable BBG Baseband Guard"
        required: true
        type: boolean
        default: false
      use_rekernel:
        description: "Enable Re-Kernel driver"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "Disable SUSFS"
        required: true
        type: boolean
        default: false
      supp_op:
        description: "Enable OnePlus 8E support"
        required: false
        type: boolean
        default: false
      droidspaces:
        description: "Droidspaces container support (5.10~6.6: Slot patch, 6.12: On/Off)"
        required: false
        type: choice
        options:
          - "off"
          - "678"
          - "123"
          - "345"
        default: "off"
      droidspaces_ntsync:
        description: "Enable Droidspaces container NTSync support (requires Droidspaces)"
        required: false
        type: boolean
        default: false

jobs:
  build-custom-kernel:
    name: "${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.android_version }}-${{ inputs.os_patch_level }}"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: ${{ inputs.android_version }}
      kernel_version: ${{ inputs.kernel_version }}
      sub_level: ${{ inputs.sub_level }}
      os_patch_level: ${{ inputs.os_patch_level }}
      revision: ${{ inputs.revision || '' }}
      ksu_variant: "ReSukiSU"
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: ${{ inputs.supp_op || false }}
      enable_susfs: ${{ !inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces || 'off' }}
      droidspaces_ntsync: ${{ inputs.droidspaces_ntsync || false }}

  get-ksu-manager:
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
