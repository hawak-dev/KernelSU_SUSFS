name: "Feature Request / Feature Request"
description: "Suggest a feature / Suggest New Feature"
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        **Please describe your request / Please describe your requirement**

  - type: textarea
    id: feature
    attributes:
      label: "Feature Description / Feature Description"
      description: "Describe the feature you want / Describe desired feature"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: "Use Case / Use Case"
      description: "Why do you need this feature / Why is this feature needed"

  - type: textarea
    id: additional
    attributes:
      label: "Additional Info / Additional Info"
      description: "Any other context, links or screenshots / Other related info, links or screenshots"
